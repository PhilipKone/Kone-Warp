<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="warpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="50%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0c0a0f" stop-opacity="0" />
    </linearGradient>
    
    <!-- Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Glow Circle -->
  <circle cx="256" cy="256" r="220" fill="url(#glowGrad)" />

  <!-- Outer Tech circular ring with dashed paths -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#warpGrad)" stroke-width="4" stroke-opacity="0.3" />
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#cyanGrad)" stroke-width="4" stroke-linecap="round" stroke-dasharray="120 30 180 40 80 50" filter="url(#glow)" />

  <!-- Inner circular ring -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.1" />

  <!-- Dynamic Warp Speed Lines -->
  <g stroke="url(#warpGrad)" stroke-width="4" fill="none" stroke-linecap="round" filter="url(#glow)">
    <path d="M 120 220 L 220 220" opacity="0.6" stroke-dasharray="10 15" />
    <path d="M 100 256 L 240 256" stroke-width="6" stroke-dasharray="20 15" />
    <path d="M 110 292 L 210 292" opacity="0.6" stroke-dasharray="15 20" />
  </g>

  <!-- Futuristic Rocket/Ship/Cursor Warping -->
  <!-- Wing trails / Speed streaks -->
  <path d="M 190 256 L 310 170 L 290 256 L 310 342 Z" fill="url(#warpGrad)" filter="url(#glow)" />
  <path d="M 230 256 L 350 170 L 330 256 L 350 342 Z" fill="url(#cyanGrad)" />
  
  <!-- Core jet flame (White-blue hot center) -->
  <polygon points="210,256 250,240 240,256 250,272" fill="#ffffff" filter="url(#glow)" />

  <!-- Target destination/coordinates portal ring -->
  <ellipse cx="380" cy="256" rx="25" ry="50" fill="none" stroke="#ffffff" stroke-width="3" stroke-opacity="0.8" filter="url(#glow)" />
  <circle cx="380" cy="256" r="6" fill="#06b6d4" filter="url(#glow)" />

  <!-- Small floating telemetry/cyber nodes -->
  <circle cx="300" cy="120" r="7" fill="#ec4899" filter="url(#glow)" opacity="0.8" />
  <circle cx="340" cy="140" r="5" fill="#3b82f6" filter="url(#glow)" opacity="0.8" />
  <circle cx="160" cy="150" r="8" fill="#a855f7" filter="url(#glow)" opacity="0.7" />
  <circle cx="180" cy="380" r="6" fill="#06b6d4" filter="url(#glow)" opacity="0.7" />
</svg>
